<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SentenceMiner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>SentenceMiner</h1>
      <p class="subtitle">Teste de captura de selecao (Fase 1)</p>
      <div class="controls">
        <button id="btn-capture-text">Capturar selecao</button>
        <button id="btn-capture-ocr">OCR ultimo print</button>
      </div>
      <div class="controls">
        <label class="label" for="anki-model">Note type:</label>
        <select id="anki-model"></select>
        <label class="label" for="anki-deck">Baralho:</label>
        <select id="anki-deck"></select>
      </div>
      <div id="status" class="status">Status: iniciando...</div>

      <div class="section">
        <label class="label" for="sentence">Frente (frase)</label>
        <textarea id="sentence" class="output" aria-live="polite" placeholder="Frase capturada aparece aqui..."></textarea>
      </div>

      <div class="section">
        <label class="label" for="term">Termo desconhecido</label>
        <input id="term" class="text-input" placeholder="Digite o termo..." />
      </div>

      <div class="controls">
        <label class="label" for="card-model">Modelo:</label>
        <select id="card-model">
          <option value="iniciante">Iniciante</option>
          <option value="intermediario" selected>Intermediario</option>
          <option value="avancado">Avancado</option>
        </select>
        <label class="label" for="format-preset">Preset:</label>
        <select id="format-preset"></select>
        <button id="btn-generate">Gerar verso</button>
      </div>

      <div class="section">
        <label class="label" for="back">Verso</label>
        <textarea id="back" class="output" placeholder="Verso gerado aparece aqui..."></textarea>
      </div>

      <div class="controls">
        <button id="btn-add-anki">Adicionar ao Anki</button>
      </div>
    </main>
    <script src="main.js"></script>
  </body>
</html>
